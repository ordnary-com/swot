name: Validate Package

on:
  pull_request:
    paths:
      - "lib/domains/**"
      - "scripts/compile.mjs"
      - "src/**"
      - "README.md"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".npmignore"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Recompile swot data
        run: node scripts/compile.mjs

      - name: Verify generated file is committed
        run: git diff --exit-code swot-data.json

      - name: Typecheck
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Verify pack output
        run: npm pack --dry-run

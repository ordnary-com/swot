name: Compile SWOT Data

on:
  push:
    branches: [master, main]
    paths:
      - 'lib/domains/**'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compile domains → swot-data.json
        run: node scripts/compile.mjs

      - name: Commit swot-data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add swot-data.json
          git diff --staged --quiet || git commit -m "chore: recompile swot-data.json [skip ci]"
          git push

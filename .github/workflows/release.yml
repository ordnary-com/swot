name: Release @ordnary/swot

on:
  push:
    branches:
      - main
      - master
    paths:
      - "lib/domains/**"
      - "scripts/compile.mjs"
      - "src/**"
      - "README.md"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".npmignore"
  workflow_dispatch:

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Compile domains to swot-data.json
        run: node scripts/compile.mjs

      - name: Bump patch version
        run: npm run release:patch

      - name: Build package
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public

      - name: Commit release artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add swot-data.json package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore: release npm package [skip ci]"
          git push
